openapi: 3.0.3
info:
  title: 家方云选款相关API文档
  description: 选款单相关接口（客户选择工厂的产品）
  version: 1.0.0

servers:
  - url: https://your-domain.com/api
    description: 生产环境
  - url: https://dev-domain.com/api
    description: 开发环境
  - url: http://localhost/api
    description: 本地环境

tags:
  - name: 相册管理
    description: 相册和选款单管理相关接口

paths:
  /album/selection/create:
    post:
      tags:
        - 相册管理
      summary: 创建选款单（客户选择工厂的产品）
      description: 客户在某个厂家的产品下创建选款单，一张选款单只能包含同一厂家的产品。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - product_id
                - pic_ids
                - factory_uid
              properties:
                product_id:
                  type: integer
                  description: 产品ID
                pic_ids:
                  oneOf:
                    - type: array
                      items:
                        type: integer
                    - type: string
                  description: 选中的花色图ID列表，支持数组、JSON字符串或逗号分隔字符串。
                factory_uid:
                  type: integer
                  description: 产品所属厂家的用户ID，所有产品必须属于该厂家。
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: 创建成功
                data:
                  id: 1
                  name: "20231027 FST12"
                  uid: 1001
                  customer_uid: 1001
                  factory_uid: 2001
                  product_id: 501
                  uniacid: 1
                  create_time: 1698391234
                  update_time: 1698391234

  /album/selection/detail:
    post:
      tags:
        - 相册管理
      summary: 获取选款单详情
      description: 获取包含产品明细的选款单详情，返回客户和厂家信息。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - selection_id
              properties:
                selection_id:
                  type: integer
                  description: 选款单ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: success
                data:
                  info:
                    id: 1
                    name: "20231027 FST12"
                    uid: 1001
                    customer_uid: 1001
                    factory_uid: 2001
                    product_id: 501
                    uniacid: 1
                    create_time: 1698391234
                    update_time: 1698391234
                  customer:
                    id: 1001
                    nickname: "客户昵称"
                    avatar: "https://example.com/avatar.jpg"
                    mobile: "13800000000"
                    company_name: "客户公司"
                  factory:
                    id: 2001
                    nickname: "厂家昵称"
                    avatar: "https://example.com/factory.jpg"
                    mobile: "13900000000"
                    company_name: "厂家公司"
                  product_summary:
                    id: 501
                    name: "春夏花型A"
                    desc: "轻奢风产品"
                    cover_img: "https://example.com/product-cover.jpg"
                    share_img: "https://example.com/product-cover.jpg"
                    category_ids:
                      - 11
                      - 12
                  share_img: "https://example.com/main.jpg"
                  total_selected: 3
                  grouped_pictures:
                    main_pictures:
                      - id: 9001
                        src: "https://example.com/main.jpg"
                        pic_name: "主图"
                        is_main: true
                    variant_pictures:
                      - id: 9002
                        src: "https://example.com/color-1.jpg"
                        pic_name: "花色1"
                        is_main: false
                      - id: 9003
                        src: "https://example.com/color-2.jpg"
                        pic_name: "花色2"
                        is_main: false
                    detail_pictures:
                      - id: 9010
                        src: "https://example.com/detail-1.jpg"
                        pic_name: "详情图1"
                        is_main: false
                  list:
                    - id: 9002
                      selection_item_id: 101
                      product_id: 501
                      src: "https://example.com/color-1.jpg"
                      imgurl: "https://example.com/color-1.jpg"
                      pic_name: "花色1"
                      file_type: 1
                      is_main: false
                  cover_img:
                    - "https://example.com/color-1.jpg"
                    - "https://example.com/color-2.jpg"

  /album/selection/my_lists:
    post:
      tags:
        - 相册管理
      summary: 获取我的选款单列表（客户）
      description: 返回当前登录客户创建的选款单列表。
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  description: 每页数量，默认10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: success
                data:
                  total: 1
                  per_page: 10
                  current_page: 1
                  last_page: 1
                  data:
                    - id: 1
                      name: "20231027 FST12"
                      uid: 1001
                      customer_uid: 1001
                      factory_uid: 2001
                      product_id: 501
                      product_count: 5
                      cover_img:
                        - "https://example.com/product1-thumb.jpg"
                        - "https://example.com/product2-thumb.jpg"
                      share_img: "https://example.com/product-main.jpg"
                      selected_preview:
                        - id: 9002
                          src: "https://example.com/product1-thumb.jpg"
                          pic_name: "花色1"
                        - id: 9003
                          src: "https://example.com/product2-thumb.jpg"
                          pic_name: "花色2"
                      product:
                        id: 501
                        name: "春夏花型A"
                        desc: "轻奢风产品"
                        cover_img: "https://example.com/product-main.jpg"
                        share_img: "https://example.com/product-main.jpg"
                        category_ids:
                          - 11
                      uniacid: 1
                      create_time: 1698391234
                      update_time: 1698391234

  /album/selection/customer_lists:
    post:
      tags:
        - 相册管理
      summary: 获取客户选款单列表（厂家）
      description: 厂家查看所有客户针对自己的选款单列表。
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  description: 每页数量，默认10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: success
                data:
                  total: 1
                  per_page: 10
                  current_page: 1
                  last_page: 1
                  data:
                    - id: 1
                      name: "20231027 FST12"
                      uid: 1001
                      customer_uid: 1001
                      factory_uid: 2001
                      product_id: 501
                      product_count: 5
                      cover_img:
                        - "https://example.com/product1-thumb.jpg"
                        - "https://example.com/product2-thumb.jpg"
                      share_img: "https://example.com/product-main.jpg"
                      selected_preview:
                        - id: 9002
                          src: "https://example.com/product1-thumb.jpg"
                          pic_name: "花色1"
                      product:
                        id: 501
                        name: "春夏花型A"
                        desc: "轻奢风产品"
                        cover_img: "https://example.com/product-main.jpg"
                        share_img: "https://example.com/product-main.jpg"
                        category_ids:
                          - 11
                      uniacid: 1
                      create_time: 1698391234
                      update_time: 1698391234
                      customer:
                        id: 1001
                        nickname: "客户昵称"
                        avatar: "https://example.com/avatar.jpg"
                        mobile: "13800000000"
                        company_name: "客户公司"
                      factory:
                        id: 2001
                        nickname: "厂家昵称"
                        avatar: "https://example.com/factory.jpg"
                        mobile: "13900000000"
                        company_name: "厂家公司"

  /album/selection/feedback:
    post:
      tags:
        - 相册管理
      summary: 提交选款单反馈（客户）
      description: 客户针对自己的选款单提交反馈内容。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - selection_id
                - content
              properties:
                selection_id:
                  type: integer
                  description: 选款单ID
                content:
                  type: string
                  description: 反馈内容
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: 提交成功
                data: {}

  /album/selection/update:
    post:
      tags:
        - 相册管理
      summary: 修改选款单名称（客户）
      description: 客户修改自己选款单的名称。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - selection_id
              properties:
                selection_id:
                  type: integer
                  description: 选款单ID
                name:
                  type: string
                  description: 新的选款单名称
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: 修改成功
                data: {}

  /album/selection/add_products:
    post:
      tags:
        - 相册管理
      summary: 选款单新增产品（客户）
      description: 客户在自己的选款单中新增产品，只能添加同一厂家的产品。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - selection_id
                - product_ids
              properties:
                selection_id:
                  type: integer
                  description: 选款单ID
                product_ids:
                  type: array
                  items:
                    type: integer
                  description: 产品ID数组；也支持逗号分隔字符串。
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: 操作成功
                data: {}

  /album/selection/remove_products:
    post:
      tags:
        - 相册管理
      summary: 选款单移除产品（客户）
      description: 客户从自己的选款单中移除指定产品。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - selection_id
                - product_ids
              properties:
                selection_id:
                  type: integer
                  description: 选款单ID
                product_ids:
                  type: array
                  items:
                    type: integer
                  description: 产品ID数组；也支持逗号分隔字符串。
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: 操作成功
                data: {}

  /album/selection/delete:
    post:
      tags:
        - 相册管理
      summary: 删除选款单（客户）
      description: 客户删除自己的选款单，选款单内产品关联同时被清理。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - selection_id
              properties:
                selection_id:
                  type: integer
                  description: 选款单ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: 删除成功
                data: {}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token认证，格式：Bearer {token}

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 状态码，2000表示成功
          example: 2000
        msg:
          type: string
          description: 提示信息
          example: success
        data:
          description: 返回数据
      required:
        - code
        - msg
        - data

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误状态码
        msg:
          type: string
          description: 错误信息
        data:
          type: object
      required:
        - code
        - msg
