components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token认证，格式：Bearer {token}

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 状态码，2000表示成功
          example: 2000
        msg:
          type: string
          description: 提示信息
          example: success
        data:
          description: 返回数据
      required:
        - code
        - msg
        - data

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误状态码
          enum: [4000, 4001, 4100, 4003, 5000]
        msg:
          type: string
          description: 错误信息
        data:
          type: object
      required:
        - code
        - msg

    UserInfo:
      type: object
      properties:
        nickname:
          type: string
        avatar:
          type: string
        user_uuid:
          type: string
        is_new_user:
          type: integer
        all_space:
          type: string
        space_used:
          type: string
        grade_name:
          type: string
        grade_level:
          type: integer
        end_time:
          type: string
        join_time:
          type: string
        total_pics:
          type: integer
        total_collects:
          type: integer

    LoginResponse:
      type: object
      properties:
        openid:
          type: string
        user_uuid:
          type: string
        token:
          type: string
        user:
          type: object
          properties:
            nickname:
              type: string
            avatar:
              type: string
            vip_grade:
              type: integer
            grade_name:
              type: string
