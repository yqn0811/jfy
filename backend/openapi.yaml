openapi: 3.0.3
info:
  title: 家方云后端API文档
  description: 家方云小程序/公众号后端API接口文档
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: https://your-domain.com/api
    description: 生产环境
  - url: https://dev-domain.com/api
    description: 开发环境
  - url: http://localhost/api
    description: 本地环境

tags:
  - name: 用户相关
    description: 用户登录、信息管理相关接口
  - name: 公共接口
    description: 公共功能接口
  - name: 相册管理
    description: 相册和图片管理相关接口
  - name: 分销系统
    description: 分销相关接口
  - name: 会员系统
    description: 会员等级相关接口
  - name: 套票系统
    description: 套票相关接口
  - name: 卡券系统
    description: 卡券相关接口
  - name: 充值订单
    description: 充值和订单相关接口
  - name: 排行系统
    description: 排行榜相关接口
  - name: 口碑评价
    description: 口碑评价相关接口
  - name: 公众号
    description: 公众号相关接口
  - name: PC上传
    description: PC端上传相关接口
  - name: 调试
    description: 调试与环境检查接口

security:
  - bearerAuth: []

paths:
  /user/openid:
    get:
      tags:
        - 用户相关
      summary: 获取用户OpenID
      description: 通过微信登录code获取用户openid和token
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: 微信登录code
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                code: 2000
                msg: success
                data:
                  openid: "xxx"
                  user_uuid: "xxx"
                  token: "jwt_token_string"
                  user:
                    nickname: "用户昵称"
                    avatar: "https://example.com/avatar.jpg"
                    vip_grade: 1
                    grade_name: "普通会员"

  /user/phone:
    post:
      tags:
        - 用户相关
      summary: 获取用户手机号
      description: 通过微信手机号授权code获取用户手机号并绑定
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - code
                - openid
              properties:
                code:
                  type: string
                  description: 微信手机号授权code
                openid:
                  type: string
                  description: 用户openid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /user/update_info:
    post:
      tags:
        - 用户相关
      summary: 更新用户信息
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - openid
              properties:
                openid:
                  type: string
                nickname:
                  type: string
                avatar:
                  type: string
                wx_ewm:
                  type: string
                user_desc:
                  type: string
                upload_pwd:
                  type: string
                  pattern: '^[A-Za-z0-9]{4}$'
                  description: 上传密码，4位字母或数字
                upload_pwd_expire_time:
                  type: integer
                  description: 批量上传密码过期时间，0表示永久有效
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /user/show_info:
    get:
      tags:
        - 用户相关
      summary: 获取用户信息
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /user/all_pics:
    get:
      tags:
        - 用户相关
      summary: 获取用户所有照片列表
      parameters:
        - name: key
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
