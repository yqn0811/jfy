version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jfyt-php-backend
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./logs/apache2:/var/log/apache2
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    networks:
      - app-network

  db:
    image: mysql:5.7
    platform: linux/amd64
    container_name: newjfybackend-db
    restart: unless-stopped
    ports:
      - "33060:3306"
    environment:
      MYSQL_DATABASE: yunce_jiumirw_co
      MYSQL_USER: yunce_jiumirw_co
      MYSQL_PASSWORD: JEj9bHykFznH
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: newjfybackend-redis
    restart: unless-stopped
    ports:
      - "63790:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
