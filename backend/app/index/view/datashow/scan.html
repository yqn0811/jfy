<style>
  .contentbox {
    background-color: #191B1F !important;
  }

  .content_head_title {
    display: none;
  }

  .page_content {
    background: #2D2E31;
    padding: 4px 0;
    min-height: 800px;
    padding-top: 80px;
    text-align: center;
  }

  .scan-page .title {
    font-size: 24px;
    color: #FFFFFF;
  }

  .scan-page .info {
    font-weight: 400;
    font-size: 15px;

  .input-box {

    /*width: 900px;*/

<input type="hidden" id="nowhtml" value="dataShow" class="scanpage">
<div class="scan-page">
  <div class="title">扫码核销</div>
  <div class="info">请用扫码枪核销二维码</div>
  <div class="input-box">
    <input type="text" class="input-text" id="myInput">
    <span class="scan-btn" onclick="checkScanInfo()">立即核销</span>
    <span class="scan-btn" onclick="checkScanUser()">查询会员</span>
  </div>
</div>

<script>
  var has_show = 0;
  // 确保在DOM完全加载后执行
  document.addEventListener("DOMContentLoaded", function() {
      var input = document.getElementById("myInput");
      input.focus();
  });

  $(document).ready(function (){
    $("#myInput").on('input', function (){
      var value = $(this).val();
      if(value.indexOf('LW_') != -1){
        if(value.indexOf('+GIVEBALANCE') != -1){
          if (value.length == 51){
            if(has_show == 0){
              checkScanUser(value, 'give')
              has_show = 1;
            }
          }
        }else{
          if (value.length == 39){
            if(has_show == 0){
              checkScanUser(value, '')
              has_show = 1;
            }
          }
        }
      }else{
        if (value.length == 32){
          checkScanInfo(value)
        }
      }
    })
  })

  function checkScanInfo(key=''){
    if(has_show == 1){
      return false
    }
    if(key){
      value = key;
    }else{
      var value = $("#myInput").val();
    }
    if(!value){
      alert('请输入查询信息')
      return false;
    }
    layer.msg('查询中...');
    $.ajax({
      url:"{:Url('Datashow/checkScanInfo')}",
      type:"post",
      dataType:'json',
      data:{
        appletid: 1,
        search_key: value,
      },
      success:function(result){
        has_show = 0
        if(result.code == 1){
          $("#myInput").val('');
          layer.closeAll()
          window.open(result.data)
        }else{
          alert(result.msg)
        }
      }
    })

  }

  function checkScanUser(key='', type=''){
    if(key){
      value = key;
    }else{
      var value = $("#myInput").val();
    }
    if(!value){
      alert('请输入查询信息')
      return false;
    }
    $.ajax({
      url:"{:Url('Datashow/checkScanUser')}",
      type:"post",
      dataType:'json',
      data:{
        appletid: 1,
        search_key: value,
      },
      success:function(result){
        if(result.code == 1){
          $('#nickname').html(result.data.nickname)
          $('#realname').html(result.data.realname)
          $('#message').val('')
          if(type == 'give'){
            $('#user_blance').val(result.data.give_balance)
            $('#show_user_money').html('用户零钱：')
            $('#message').val('台球消费')
          }else{
            $('#user_blance').val(result.data.balance)
            $('#show_user_money').html('用户余额：')
          }

          $('#mobile').html(result.data.mobile)
          layer.open({
            type: 1,
            content: $('#checkOut'),
            title: ["收银台", "text-align:center;padding:0;font-weight:600;font-size:17px"],
            area: ["900px", "500px"],
            btn: ["确定", "取消"],
            btnAlign: 'c',
            closeBtn: 0,
            success: function () {
              console.log('确定')
            },
            yes: function (index){
              var pay_price = $("#pay_price").val();
              var message = $("#message").val();
              if(!pay_price){
                alert('请输入支付金额')
                return;
              }
              if(type == 'give'){
                if(pay_price*1 > result.data.give_blance*1){
                  alert('用户零钱不足')
                  return;
                }
              }else{
                if(pay_price*1 > result.data.balance*1){
                  alert('用户余额不足')
                  return;
                }
              }

              // var now_load = layer.open({
              //   title: '提示',
              //   content: '加载中...',
              //   icon: 0,
              //   closeBtn: 0,
              //   btn: []
              // });
              $.ajax({
                url:"{:Url('Datashow/changeUserBalance')}",
                type:"post",
                dataType:'json',
                data:{
                  appletid: 1,
                  user_id: result.data.id,
                  pay_price: pay_price,
                  message: message,
                  search_key: value,
                },
                success:function(res){
                  if(res.code == 1){
                    layer.msg("操作成功！", {
                      time: 1000,
                    });
                    setTimeout(() => {
                      location.reload()
                    }, 1000);
                  }else{
                    alert(res.msg)
                  }
                }
              })

            }
          })
        }else{
          alert(result.msg)
        }
      }
    })
  }

  </script>
