<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport"
		content="width=device-width,user-scalable=no,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">
	<link rel="stylesheet" href="/assets/css/new-index.css" />
	<script src="/assets/js/jquery.min.js" type="text/javascript" charset="utf-8"></script>
	<script src="/assets/js/new-index.js" type="text/javascript" charset="utf-8"></script>
	<title>云相册管理系统</title>
	<style>
		.login_bg {
			background-size: 100% 100%;
		}

		.login-box {
			width: 420px;
			box-sizing: border-box;
			background: linear-gradient(90deg, #00DBAB, #008FC9);
			border-radius: 12px;
			padding: 50px 40px 36px 40px;
			text-align: center;
			position: absolute;
			top: 17%;
			right: 11%;
		}

		.welcome-img {
			width: 223px;
			height: 24px;
		}

		.form-label {
			font-size: 14px;
			color: #000000;
		}

		.form-box {
			text-align: left;
		}

		.login_input {
			border-bottom: 1px solid rgba(235, 237, 245, 0.5);
			width: 100%;
			margin-bottom: 40px;
			font-size: 14px;
			color: #20303F;
			height: 40px;
			line-height: 40px;
		}

		.login_input::placeholder {
			color: rgba(32, 48, 63, 0.6);
		}

		.login_submit {
			margin-top: 50px;
			text-align: center;
			line-height: 48px;
			width: 336px;
			height: 48px;
			background: #000000;
			border-radius: 6px;
			font-size: 15px;
			color: #FFFFFF;
			line-height: 47px;
		}
	</style>
</head>

<body>
	<div class="login_bg" style="background-image: url(/image/login_leftbg.png);">
		<div class="login-box">
			<img src="/image/welcome.png" alt="" class="welcome-img">
			<form class="login_form" action="{:Url('LoginController/doLogin')}" method="post" onsubmit="return checkinfo();">
				<div class="form-box">
					<div class="form-label">用户登录</div>
					<input class="login_input " type="text" name="username" id="username" value="" placeholder="请输入账号" />
				</div>
				<div class="form-box">
					<div class="form-label">登录密码</div>
					<input class="login_input " type="password" name="password" id="password" value="" placeholder="请输入密码" />
				</div>
				<!--						<div class="forget_psw">-->
				<!--							<span onclick="showTip()">-->
				<!--							忘记密码？-->
				<!--							</span>-->
				<!--						</div>-->
				<input class="login_submit" type="submit" value="登录" />
			</form>
		</div>
	</div>
</body>

</html>
<script>
	function checkinfo() {
		var username = $("#username").val();
		var password = $("#password").val();
		if (!username) {
			alert("用户名不能为空！");
			$("#username").focus();
			return false;
		}
		if (!password) {
			alert("密码不能为空！");
			$("#password").focus();
			return false;
		}
	}
	//定义变量获取屏幕视口宽度
	var windowWidth = $(window).width();
	if (windowWidth < 640) {
		$('.login_bg').css('width', windowWidth);
		$('body').css('width', windowWidth);
		$('body').css('min-width', windowWidth);
		$('.login_leftdiv').css('display', 'none');
	}
	if (windowWidth >= 640) {
		// do something
	}
</script>
